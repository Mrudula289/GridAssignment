<!DOCTYPE html>
<html>
<head>
<title>Grid Blog Layout</title>

<style>

body{
    margin:40px;
    font-family: Arial;
}

.grid{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    grid-gap:15px;
    
}

.card{
    position:relative;
    color:white;
    height:200px;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.text{
    position:absolute;
    top:15px;
    left:15px;
    font-size:18px;
}

.read{
    position:absolute;
    bottom:15px;
    right:15px;
    font-size:12px;
}

/* spans */

.col2{
    grid-column:span 2;
}

.row2{
    grid-row:span 2;
}

</style>

</head>

<body>

<div class="grid">

<div class="card">
<img src="https://thumbs.dreamstime.com/b/landscape-sky-full-moon-seascape-to-night-serenity-nature-beautiful-view-sea-many-stars-attractive-dark-cloud-141554532.jpg">
<div class="text">The winter of my discontent</div>
<div class="read">READ POST</div>
</div>

<div class="card col2">
<img src="https://media.istockphoto.com/id/498309616/photo/great-ocean-road-at-night-milky-way-view.jpg?s=612x612&w=0&k=20&c=fJGWCAB4JoXaQD6gjJRHjPmPIRvx5e6K-1Oq2EeOZwk=">
<div class="text">Instagram is toxic but I keep posting</div>
<div class="read">READ POST</div>
</div>

<div class="card col2">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT0vu_WWxUxRpt096KbJhBmeICtnAVnhvSong&s">
<div class="text">Throwing my phone into the ocean</div>
<div class="read">READ POST</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1494526585095-c41746248156">
<div class="text">I'm never leaving my mom</div>
<div class="read">READ POST</div>
</div>

<div class="card">
<img src="https://plus.unsplash.com/premium_photo-1675314800192-f5a9f1f6f654?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8bmlnaHQlMjBuYXR1cmV8ZW58MHx8MHx8fDA%3D">
<div class="text">Staring at the horizon thinking</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e">
<div class="text">This is water</div>
</div>

<div class="card">
<img src="https://media.istockphoto.com/id/1465441739/photo/romantic-night-scene.jpg?s=612x612&w=0&k=20&c=gt2thGqqfyvlEd4BkvFfG7ca8Jq_rUeFZhTg_bOh6cU=">
<div class="text">Tapio for one please</div>
</div>

</div>

</body>
</html>
