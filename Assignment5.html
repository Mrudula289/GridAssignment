<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Grid Layout</title>
<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
padding:40px;
background:#f4f4f4;
}

.grid-container{

display:grid;

/* auto-fill + minmax for responsive grid */

grid-template-columns:repeat(auto-fill, minmax(200px,1fr));

gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
text-align:center;
padding-bottom:15px;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h3{
margin:10px 0;
}

.card p{
padding:0 10px;
color:#555;
}
</style>
</head>

<body>

<div class="grid-container">

<div class="card">
<img src="https://picsum.photos/300/200?1">
<h3>Mountain</h3>
<p>Beautiful mountain landscape.</p>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?2">
<h3>Forest</h3>
<p>Peaceful green forest view.</p>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?3">
<h3>Beach</h3>
<p>Relaxing beach environment.</p>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?4">
<h3>City</h3>
<p>Modern city skyline.</p>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?5">
<h3>Desert</h3>
<p>Golden sand dunes.</p>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?6">
<h3>Waterfall</h3>
<p>Beautiful flowing waterfall.</p>
</div>

</div>

</body>
</html>
